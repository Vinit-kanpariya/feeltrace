# SoluteLabs Harness - CI secret scan (TruffleHog)
#
# Last line of defence if a developer commits with `--no-verify` and bypasses
# the local .githooks/pre-commit scanner. Runs on every push and PR.
#
# Why TruffleHog and not gitleaks-action: gitleaks-action@v2 requires a paid
# GITLEAKS_LICENSE for any GitHub org with > 10 users. TruffleHog (the OSS
# CLI and the trufflesecurity/trufflehog Action) is free for orgs of any
# size, no license key required, MIT/AGPL.
#
# `--only-verified` makes TruffleHog hit each provider's API to confirm the
# finding is a live credential before failing the build. Cuts false positives
# dramatically. Trade-off: the runner makes outbound calls to AWS/Stripe/
# GitHub/etc. for each candidate. If your compliance posture forbids that,
# remove the flag and accept higher noise.
#
# Drop-in copy: lives at .github/workflows/secret-scan.yml in the project repo.

name: secret-scan

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
